<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>JDVIRTUAL - Atuador Elétrico Multivoltas</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        /* Painel superior - fontes ampliadas */
        #controls-panel {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 20px 30px;
            color: white;
            z-index: 20;
            width: 90%;
            max-width: 1300px;
            border-bottom: 4px solid #ffaa00;
            pointer-events: auto;
            font-size: 1.6rem;
            box-shadow: 0 8px 30px rgba(0,0,0,0.6);
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }
        .panel-left {
            display: flex;
            align-items: center;
            gap: 25px;
            flex-wrap: wrap;
        }
        .panel-right {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        h3 {
            margin: 0;
            font-size: 2rem;
            color: #ffaa00;
            white-space: nowrap;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #1e2a2e;
            padding: 8px 20px;
            border-radius: 60px;
        }
        .control-group span {
            font-size: 1.4rem;
        }
        .value-display {
            font-family: monospace;
            background: #0f2128;
            padding: 6px 16px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.5rem;
        }
        .status-led {
            display: flex;
            gap: 15px;
        }
        .led-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1e2a2e;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 1.2rem;
        }
        .led-bulb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            transition: all 0.05s ease;
        }
        .button-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        button {
            background: #2c3e44;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1.1rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        button:hover {
            filter: brightness(1.1);
            transform: scale(0.98);
        }
        .rotate-group {
            background: #1e2a2e;
            border-radius: 60px;
            padding: 0 8px;
            display: flex;
            gap: 5px;
        }
        .rotate-btn {
            background: #3a6b8f;
            padding: 8px 16px;
            font-size: 1rem;
        }
        .vertical-group {
            background: #2c5a6e;
            border-radius: 60px;
            padding: 0 8px;
            display: flex;
            gap: 5px;
        }
        .vertical-btn {
            background: #4a7a8f;
            padding: 8px 16px;
        }
        #resetSystemBtn {
            background: #aa4444;
        }
        #resetViewBtn {
            background: #3a6b8f;
        }
        #statusMsg {
            font-size: 1.2rem;
            color: #aaa;
            background: #0f2128;
            padding: 6px 18px;
            border-radius: 30px;
        }
        .torque-info {
            font-size: 1.2rem;
            background: #0f2128;
            padding: 6px 18px;
            border-radius: 30px;
        }
        #instruction {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(6px);
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 1rem;
            color: #ccc;
            pointer-events: none;
            font-family: monospace;
            z-index: 15;
        }
        @media (max-width: 1200px) {
            #controls-panel { flex-direction: column; align-items: stretch; width: 95%; padding: 15px; top: 10px; }
            .panel-left, .panel-right { justify-content: center; flex-wrap: wrap; }
            h3 { font-size: 1.6rem; white-space: normal; text-align: center; }
            button { font-size: 1rem; padding: 8px 14px; }
            .value-display { font-size: 1.2rem; }
            .torque-info, #statusMsg { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div id="controls-panel">
        <div class="panel-left">
            <h3>⚙️ JDVIRTUAL - Atuador Elétrico Multivoltas</h3>
            <div class="control-group">
                <span>📟 Posição:</span>
                <div class="value-display" id="positionDisplay">50.0%</div>
            </div>
            <div class="status-led">
                <div class="led-indicator"><div id="ledRed" class="led-bulb" style="background:#330000;"></div> ABRIR</div>
                <div class="led-indicator"><div id="ledOrange" class="led-bulb" style="background:#331a00;"></div> MOV</div>
                <div class="led-indicator"><div id="ledGreen" class="led-bulb" style="background:#003300;"></div> FECHAR</div>
            </div>
        </div>
        <div class="panel-right">
            <div class="button-group">
                <button id="btnAbrir" style="background:#aa3333;">🔴 ABRIR</button>
                <button id="btnStop" style="background:#cc8833;">🟠 STOP</button>
                <button id="btnFechar" style="background:#33aa33;">🟢 FECHAR</button>
                <div class="rotate-group">
                    <button id="rotateLeftBtn" class="rotate-btn" style="background:#2c5a6e;">↩️ GIRAR ←</button>
                    <button id="rotateRightBtn" class="rotate-btn" style="background:#2c5a6e;">GIRAR → ↪️</button>
                </div>
                <div class="vertical-group">
                    <button id="rotateUpBtn" class="vertical-btn" style="background:#4a7a8f;">⬆️ 360° CIMA</button>
                    <button id="rotateDownBtn" class="vertical-btn" style="background:#4a7a8f;">⬇️ 360° BAIXO</button>
                </div>
                <button id="resetSystemBtn" style="background:#aa4444;">🔄 RESET</button>
                <button id="resetViewBtn">🎥 Reset Câmera</button>
            </div>
            <div class="torque-info">
                🔧 Torque: <strong id="torqueDisplay">--</strong> Nm
            </div>
            <div id="statusMsg">Sistema pronto | Curso da gaveta dobrado (0,70)</div>
        </div>
    </div>
    <div id="instruction">🖱️ Arraste p/ rotacionar | Botão direito + arrasto p/ mover | Scroll p/ zoom</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- Cena ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x071a1f);
        scene.fog = new THREE.FogExp2(0x071a1f, 0.008);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        const defaultCamPos = new THREE.Vector3(3.8, 2.5, 4.5);
        const defaultTarget = new THREE.Vector3(0, -0.2, 0);
        camera.position.copy(defaultCamPos);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'auto';
        document.body.appendChild(labelRenderer.domElement);
        
        // Controles com mobilidade total
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 1.5;
        controls.zoomSpeed = 1.5;
        controls.panSpeed = 0.8;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.target.copy(defaultTarget);
        
        // --- Iluminação ---
        const ambient = new THREE.AmbientLight(0x404060);
        scene.add(ambient);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(2, 5, 3);
        dirLight.castShadow = true;
        scene.add(dirLight);
        const fill = new THREE.PointLight(0x5577aa, 0.4);
        fill.position.set(-1, 1, -2);
        scene.add(fill);
        const rim = new THREE.PointLight(0xffaa66, 0.5);
        rim.position.set(1, 1.5, 1.8);
        scene.add(rim);
        const groundLight = new THREE.PointLight(0x3388aa, 0.3);
        groundLight.position.set(0, -1.8, 0);
        scene.add(groundLight);
        
        const grid = new THREE.GridHelper(8, 20, 0x88aaff, 0x335566);
        grid.position.y = -1.6;
        grid.material.transparent = true;
        grid.material.opacity = 0.35;
        scene.add(grid);
        
        // --- Grupos de transformação (inclinação e rotações) ---
        const rootGroup = new THREE.Group();
        const tiltAngle = -15 * Math.PI / 180;
        rootGroup.rotation.x = tiltAngle;
        scene.add(rootGroup);
        
        const verticalRotGroup = new THREE.Group();
        rootGroup.add(verticalRotGroup);
        let currentVerticalAngle = 0;
        verticalRotGroup.rotation.x = currentVerticalAngle;
        
        const assemblyGroup = new THREE.Group();
        verticalRotGroup.add(assemblyGroup);
        let currentYaw = 45;
        assemblyGroup.rotation.y = currentYaw * Math.PI / 180;
        
        // ========== 1. ATUADOR ==========
        const actuatorGroup = new THREE.Group();
        const bodyGeo = new THREE.BoxGeometry(1.4, 1.2, 1.6);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x3a6b8f, roughness: 0.4, metalness: 0.7 });
        const mainBody = new THREE.Mesh(bodyGeo, bodyMat);
        mainBody.castShadow = true;
        mainBody.position.y = 0;
        actuatorGroup.add(mainBody);
        
        // Detalhes laterais (nervuras)
        const ribMat = new THREE.MeshStandardMaterial({ color: 0xbc9a6c, metalness: 0.85 });
        for (let i = -0.6; i <= 0.6; i+=1.2) {
            const rib = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.08, 1.7), ribMat);
            rib.position.set(i, 0.45, 0);
            actuatorGroup.add(rib);
            const ribLow = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.08, 1.7), ribMat);
            ribLow.position.set(i, -0.4, 0);
            actuatorGroup.add(ribLow);
        }
        
        // Tampa frontal (apenas estética)
        const frontPlate = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.9, 0.08), new THREE.MeshStandardMaterial({ color: 0x2c4e6e, metalness: 0.6 }));
        frontPlate.position.set(0, 0.1, 0.81);
        actuatorGroup.add(frontPlate);
        
        // LED de comunicação
        const ledComm = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 8), new THREE.MeshStandardMaterial({ color: 0xff3300, emissive: 0xff2200 }));
        ledComm.position.set(-0.98, 0.52, 0.38);
        actuatorGroup.add(ledComm);
        
        // Anel de torque
        const torqueRingMatObj = new THREE.MeshStandardMaterial({ color: 0xffaa44, metalness: 0.9, emissive: 0x442200 });
        const torqueRing = new THREE.Mesh(new THREE.TorusGeometry(0.33, 0.05, 32, 48), torqueRingMatObj);
        torqueRing.rotation.x = Math.PI / 2;
        torqueRing.position.y = -0.75;
        actuatorGroup.add(torqueRing);
        
        assemblyGroup.add(actuatorGroup);
        
        // ========== 2. REDUTOR ==========
        const reducerGroup = new THREE.Group();
        const reducerBody = new THREE.Mesh(new THREE.CylinderGeometry(0.85, 0.9, 0.45, 12), new THREE.MeshStandardMaterial({ color: 0x6f8f9f, metalness: 0.6 }));
        reducerBody.castShadow = true;
        reducerBody.position.y = -0.95;
        reducerGroup.add(reducerBody);
        const reducerRib = new THREE.Mesh(new THREE.TorusGeometry(0.75, 0.05, 16, 48), new THREE.MeshStandardMaterial({ color: 0xccaa66 }));
        reducerRib.rotation.x = Math.PI / 2;
        reducerRib.position.y = -0.78;
        reducerGroup.add(reducerRib);
        const reducerFlange = new THREE.Mesh(new THREE.CylinderGeometry(0.7, 0.7, 0.1, 8), new THREE.MeshStandardMaterial({ color: 0xaa8866 }));
        reducerFlange.position.y = -1.18;
        reducerGroup.add(reducerFlange);
        assemblyGroup.add(reducerGroup);
        
        // ========== 3. VÁLVULA GAVETA COM CORPO TRANSPARENTE ==========
        const valveGroup = new THREE.Group();
        valveGroup.rotation.y = Math.PI / 2; // girada 90° localmente
        const valveBodyMat = new THREE.MeshStandardMaterial({ color: 0x8b5a2b, metalness: 0.3, roughness: 0.4, transparent: true, opacity: 0.35 });
        const valveBody = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.6, 1.2), valveBodyMat);
        valveBody.position.y = -1.55;
        valveBody.castShadow = true;
        valveGroup.add(valveBody);
        
        // Arestas do corpo
        const edgesGeo = new THREE.EdgesGeometry(new THREE.BoxGeometry(1.2, 0.6, 1.2));
        const edgesMat = new THREE.LineBasicMaterial({ color: 0xffaa66 });
        const wireframe = new THREE.LineSegments(edgesGeo, edgesMat);
        wireframe.position.copy(valveBody.position);
        valveGroup.add(wireframe);
        
        // Flanges
        const flangeMatValve = new THREE.MeshStandardMaterial({ color: 0xbc8f6a, metalness: 0.5 });
        const flangeL = new THREE.Mesh(new THREE.CylinderGeometry(0.65, 0.65, 0.15, 12), flangeMatValve);
        flangeL.rotation.z = Math.PI / 2;
        flangeL.position.set(-0.75, -1.55, 0);
        valveGroup.add(flangeL);
        const flangeR = new THREE.Mesh(new THREE.CylinderGeometry(0.65, 0.65, 0.15, 12), flangeMatValve);
        flangeR.rotation.z = Math.PI / 2;
        flangeR.position.set(0.75, -1.55, 0);
        valveGroup.add(flangeR);
        
        // Haste fixa (guia)
        const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.8, 8), new THREE.MeshStandardMaterial({ color: 0xddbb99, metalness: 0.7 }));
        stem.position.y = -1.18;
        valveGroup.add(stem);
        
        // GAVETA MÓVEL (movimento visível) - CURSO DOBRADO: de -1.58 (0%) até -0.88 (100%) -> curso 0.70
        const gateDisc = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.12, 0.9), new THREE.MeshStandardMaterial({ color: 0xdd8855, metalness: 0.7, emissive: 0x442200 }));
        gateDisc.castShadow = true;
        valveGroup.add(gateDisc);
        
        // Anel de classe
        const classRing = new THREE.Mesh(new THREE.TorusGeometry(0.55, 0.04, 16, 48), new THREE.MeshStandardMaterial({ color: 0xffaa66 }));
        classRing.rotation.x = Math.PI / 2;
        classRing.position.y = -1.85;
        valveGroup.add(classRing);
        assemblyGroup.add(valveGroup);
        
        // Conexão entre redutor e válvula
        const connector = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.18, 0.4, 8), new THREE.MeshStandardMaterial({ color: 0xaa8866 }));
        connector.position.y = -1.38;
        assemblyGroup.add(connector);
        
        // Eixo giratório interno
        const rotatingShaft = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.22, 0.45, 16), new THREE.MeshStandardMaterial({ color: 0xddbb99, metalness: 0.85 }));
        rotatingShaft.position.y = -0.92;
        actuatorGroup.add(rotatingShaft);
        
        // --- DISPLAY LATERAL AMPLIADO ---
        const displayX = 0.78;
        const displayY = 0.1;
        const displayZ = 0;
        
        const sideDisplayGeo = new THREE.CylinderGeometry(0.45, 0.45, 0.1, 48);
        const sideDisplayMat = new THREE.MeshStandardMaterial({ color: 0x111122, metalness: 0.2, roughness: 0.3, emissive: 0x226622, emissiveIntensity: 0.35 });
        const sideDisplay = new THREE.Mesh(sideDisplayGeo, sideDisplayMat);
        sideDisplay.position.set(displayX, displayY, displayZ);
        sideDisplay.rotation.y = Math.PI / 2;
        sideDisplay.castShadow = true;
        actuatorGroup.add(sideDisplay);
        
        const sideRingGeo = new THREE.TorusGeometry(0.46, 0.04, 48, 96);
        const sideRingMat = new THREE.MeshStandardMaterial({ color: 0xffaa66, metalness: 0.8 });
        const sideRing = new THREE.Mesh(sideRingGeo, sideRingMat);
        sideRing.position.set(displayX, displayY, displayZ);
        sideRing.rotation.y = Math.PI / 2;
        sideRing.rotation.x = Math.PI / 2;
        actuatorGroup.add(sideRing);
        
        const lcdSideDiv = document.createElement('div');
        lcdSideDiv.style.backgroundColor = '#0a2a1f';
        lcdSideDiv.style.color = '#8effa0';
        lcdSideDiv.style.fontFamily = 'monospace';
        lcdSideDiv.style.fontSize = '28px';
        lcdSideDiv.style.fontWeight = 'bold';
        lcdSideDiv.style.padding = '8px 12px';
        lcdSideDiv.style.borderRadius = '50%';
        lcdSideDiv.style.border = '2px solid #22aa44';
        lcdSideDiv.style.textAlign = 'center';
        lcdSideDiv.style.width = '110px';
        lcdSideDiv.style.height = '110px';
        lcdSideDiv.style.display = 'flex';
        lcdSideDiv.style.alignItems = 'center';
        lcdSideDiv.style.justifyContent = 'center';
        lcdSideDiv.style.backdropFilter = 'blur(4px)';
        lcdSideDiv.innerHTML = `50.0%`;
        const lcdSideLabel = new CSS2DObject(lcdSideDiv);
        lcdSideLabel.position.set(displayX, displayY, displayZ);
        actuatorGroup.add(lcdSideLabel);
        
        // --- VOLANTE TIMONEIRO (estilo navio) na parte superior ---
        const wheelShaft = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.1, 0.25, 8), new THREE.MeshStandardMaterial({ color: 0xbb9966, metalness: 0.6 }));
        wheelShaft.position.y = 0.72;
        wheelShaft.castShadow = true;
        actuatorGroup.add(wheelShaft);
        
        const wheelHub = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.18, 0.1, 16), new THREE.MeshStandardMaterial({ color: 0xcdb38c, metalness: 0.7 }));
        wheelHub.position.y = 0.85;
        wheelHub.castShadow = true;
        actuatorGroup.add(wheelHub);
        
        const spokeMatWheel = new THREE.MeshStandardMaterial({ color: 0xccaa77, metalness: 0.8 });
        const radius = 0.55;
        for (let i = 0; i < 6; i++) {
            const angle = (i * Math.PI * 2) / 6;
            const spoke = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.08, 0.65), spokeMatWheel);
            spoke.position.set(Math.cos(angle) * radius, 0.85, Math.sin(angle) * radius);
            spoke.rotation.z = angle;
            spoke.castShadow = true;
            actuatorGroup.add(spoke);
        }
        
        const outerWheelRing = new THREE.Mesh(new THREE.TorusGeometry(radius + 0.08, 0.07, 32, 80), new THREE.MeshStandardMaterial({ color: 0xd4af7a, metalness: 0.8 }));
        outerWheelRing.position.y = 0.85;
        outerWheelRing.rotation.x = Math.PI / 2;
        outerWheelRing.castShadow = true;
        actuatorGroup.add(outerWheelRing);
        
        const innerWheelRing = new THREE.Mesh(new THREE.TorusGeometry(radius - 0.12, 0.05, 32, 64), new THREE.MeshStandardMaterial({ color: 0xc49a6c, metalness: 0.6 }));
        innerWheelRing.position.y = 0.85;
        innerWheelRing.rotation.x = Math.PI / 2;
        innerWheelRing.castShadow = true;
        actuatorGroup.add(innerWheelRing);
        
        const centerCap = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), new THREE.MeshStandardMaterial({ color: 0xffaa66, metalness: 0.5 }));
        centerCap.position.y = 0.85;
        actuatorGroup.add(centerCap);
        
        const knobMat = new THREE.MeshStandardMaterial({ color: 0xddbb99 });
        for (let i = 0; i < 6; i++) {
            const angle = (i * Math.PI * 2) / 6;
            const knob = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), knobMat);
            knob.position.set(Math.cos(angle) * (radius + 0.09), 0.85, Math.sin(angle) * (radius + 0.09));
            actuatorGroup.add(knob);
        }
        
        // Etiquetas informativas (CSS2D)
        const addLabel = (text, pos, color) => {
            const d = document.createElement('div');
            d.textContent = text;
            d.style.background = 'rgba(0,0,0,0.7)';
            d.style.color = color;
            d.style.fontSize = '16px';
            d.style.padding = '4px 10px';
            d.style.borderRadius = '25px';
            d.style.borderLeft = `3px solid ${color}`;
            d.style.fontWeight = 'bold';
            d.style.backdropFilter = 'blur(4px)';
            const lbl = new CSS2DObject(d);
            lbl.position.copy(pos);
            assemblyGroup.add(lbl);
        };
        addLabel('🔧 Atuador Multivoltas', new THREE.Vector3(0.8, 0.9, 0.6), '#88ddff');
        addLabel('⚙️ Redutor Velocidade', new THREE.Vector3(1.0, -0.9, 0.8), '#ffaa66');
        addLabel('🔍 Gaveta (curso dobrado)', new THREE.Vector3(1.2, -1.6, -0.9), '#ffaa88');
        addLabel('📟 Display Ampliado', new THREE.Vector3(1.25, 0.3, 0.5), '#88ffaa');
        addLabel('⚓ Volante Timoneiro', new THREE.Vector3(0.7, 1.25, 0.6), '#ffcc88');
        
        // --- Lógica de movimento da gaveta (CURSO DOBRADO: 0.70 unidades) ---
        let currentPercent = 50.0;
        let isMoving = false;
        let moveDirection = 0;
        let animationId = null;
        const SPEED_PERCENT_PER_SEC = 15; // % por segundo (mais lento)
        // NOVOS LIMITES: 0% (fechada) em Y = -1.58 , 100% (aberta) em Y = -0.88 (curso = 0.70)
        const GATE_Y_MIN = -1.58;
        const GATE_Y_MAX = -0.88;  // antes -1.23, agora -0.88 (curso aumentado)
        
        const ledRed = document.getElementById('ledRed');
        const ledOrange = document.getElementById('ledOrange');
        const ledGreen = document.getElementById('ledGreen');
        const positionDisplay = document.getElementById('positionDisplay');
        const torqueDisplaySpan = document.getElementById('torqueDisplay');
        const statusMsgSpan = document.getElementById('statusMsg');
        
        function updateUI() {
            positionDisplay.innerText = `${currentPercent.toFixed(1)}%`;
            lcdSideDiv.innerHTML = `${currentPercent.toFixed(1)}%`;
            let torque = 50 + (currentPercent * 40) + (Math.sin(currentPercent * 0.1) * 100);
            torque = Math.min(5000, Math.max(50, Math.round(torque)));
            torqueDisplaySpan.innerText = torque;
            const angle = (currentPercent / 100) * Math.PI * 2 * 1.5;
            rotatingShaft.rotation.y = angle;
            torqueRing.rotation.z = angle * 0.5;
            sideDisplay.material.emissiveIntensity = 0.3 + (currentPercent / 100) * 0.5;
            torqueRingMatObj.emissiveIntensity = 0.2 + (torque / 5000) * 0.7;
            // Movimento da gaveta com curso dobrado
            const gateY = GATE_Y_MIN + (currentPercent / 100) * (GATE_Y_MAX - GATE_Y_MIN);
            gateDisc.position.y = gateY;
        }
        
        function stopMovement(resetLeds = true) {
            if (animationId) { cancelAnimationFrame(animationId); animationId = null; }
            isMoving = false; moveDirection = 0;
            if (resetLeds) {
                ledRed.style.background = '#330000'; ledRed.style.boxShadow = 'none';
                ledGreen.style.background = '#003300'; ledGreen.style.boxShadow = 'none';
                ledOrange.style.background = '#331a00'; ledOrange.style.boxShadow = 'none';
            }
        }
        
        function startMoving(targetDirection) {
            if (isMoving && moveDirection === targetDirection) return;
            stopMovement(false);
            moveDirection = targetDirection;
            isMoving = true;
            let lastTimestamp = 0;
            let lastBlink = 0;
            const blinkInterval = 180;
            let blinkState = false;
            function step(timestamp) {
                if (!isMoving) return;
                if (!lastTimestamp) lastTimestamp = timestamp;
                const delta = Math.min(0.05, (timestamp - lastTimestamp) / 1000);
                lastTimestamp = timestamp;
                let newPercent = currentPercent + (moveDirection * SPEED_PERCENT_PER_SEC * delta);
                if (moveDirection === 1 && newPercent >= 100) {
                    currentPercent = 100; updateUI(); stopMovement(true);
                    statusMsgSpan.innerText = '✅ Válvula 100% aberta (curso máximo).';
                    ledRed.style.background = '#ff3333'; ledRed.style.boxShadow = '0 0 8px #ff3333';
                    return;
                } else if (moveDirection === -1 && newPercent <= 0) {
                    currentPercent = 0; updateUI(); stopMovement(true);
                    statusMsgSpan.innerText = '✅ Válvula 0% fechada (curso mínimo).';
                    ledGreen.style.background = '#33ff33'; ledGreen.style.boxShadow = '0 0 8px #33ff33';
                    return;
                }
                currentPercent = newPercent; updateUI();
                const now = Date.now();
                if (now - lastBlink >= blinkInterval) {
                    lastBlink = now; blinkState = !blinkState;
                    if (moveDirection === 1) {
                        ledRed.style.background = blinkState ? '#ff6666' : '#aa2222';
                        ledRed.style.boxShadow = blinkState ? '0 0 12px #ff6666' : 'none';
                        ledGreen.style.background = '#003300'; ledGreen.style.boxShadow = 'none';
                    } else if (moveDirection === -1) {
                        ledGreen.style.background = blinkState ? '#66ff66' : '#22aa22';
                        ledGreen.style.boxShadow = blinkState ? '0 0 12px #66ff66' : 'none';
                        ledRed.style.background = '#330000'; ledRed.style.boxShadow = 'none';
                    }
                    ledOrange.style.background = blinkState ? '#ffaa44' : '#884400';
                    ledOrange.style.boxShadow = blinkState ? '0 0 10px #ffaa44' : 'none';
                }
                animationId = requestAnimationFrame(step);
            }
            if (animationId) cancelAnimationFrame(animationId);
            animationId = requestAnimationFrame(step);
            statusMsgSpan.innerText = moveDirection === 1 ? '🚀 Abrindo (gaveta subindo com curso dobrado)...' : '🔻 Fechando (gaveta descendo com curso dobrado)...';
        }
        
        // --- Rotação do conjunto (horizontal e vertical) ---
        function rotateHorizontal(deltaDegrees) {
            currentYaw = (currentYaw + deltaDegrees) % 360;
            if (currentYaw < 0) currentYaw += 360;
            assemblyGroup.rotation.y = currentYaw * Math.PI / 180;
            statusMsgSpan.innerText = `Horiz: ${currentYaw}°`;
            setTimeout(() => { if (statusMsgSpan.innerText.includes('Horiz')) statusMsgSpan.innerText = 'Pronto'; }, 1500);
        }
        
        function rotateVertical(deltaDegrees) {
            currentVerticalAngle = (currentVerticalAngle + deltaDegrees) % 360;
            if (currentVerticalAngle < 0) currentVerticalAngle += 360;
            verticalRotGroup.rotation.x = currentVerticalAngle * Math.PI / 180;
            statusMsgSpan.innerText = `Vert: ${currentVerticalAngle}°`;
            setTimeout(() => { if (statusMsgSpan.innerText.includes('Vert')) statusMsgSpan.innerText = 'Pronto'; }, 1500);
        }
        
        // --- Eventos dos botões ---
        document.getElementById('btnAbrir').addEventListener('click', () => startMoving(1));
        document.getElementById('btnFechar').addEventListener('click', () => startMoving(-1));
        document.getElementById('btnStop').addEventListener('click', () => {
            if (isMoving) { stopMovement(true); statusMsgSpan.innerText = `⏹️ Parado em ${currentPercent.toFixed(1)}%.`; }
            else { statusMsgSpan.innerText = '⏸️ Parado.'; }
        });
        document.getElementById('rotateLeftBtn').addEventListener('click', () => rotateHorizontal(-15));
        document.getElementById('rotateRightBtn').addEventListener('click', () => rotateHorizontal(15));
        document.getElementById('rotateUpBtn').addEventListener('click', () => rotateVertical(15));
        document.getElementById('rotateDownBtn').addEventListener('click', () => rotateVertical(-15));
        
        function fullSystemReset() {
            if (animationId) cancelAnimationFrame(animationId);
            isMoving = false; moveDirection = 0;
            currentPercent = 50.0; updateUI();
            ledRed.style.background = '#330000'; ledRed.style.boxShadow = 'none';
            ledGreen.style.background = '#003300'; ledGreen.style.boxShadow = 'none';
            ledOrange.style.background = '#331a00'; ledOrange.style.boxShadow = 'none';
            currentYaw = 45;
            currentVerticalAngle = 0;
            assemblyGroup.rotation.y = currentYaw * Math.PI / 180;
            verticalRotGroup.rotation.x = 0;
            camera.position.copy(defaultCamPos); controls.target.copy(defaultTarget); controls.update();
            statusMsgSpan.innerText = '🔄 Sistema resetado (curso dobrado).';
            setTimeout(() => { if (statusMsgSpan.innerText.includes('resetado')) statusMsgSpan.innerText = '✅ Pronto'; }, 2500);
        }
        document.getElementById('resetSystemBtn').addEventListener('click', fullSystemReset);
        document.getElementById('resetViewBtn').addEventListener('click', () => {
            camera.position.copy(defaultCamPos); controls.target.copy(defaultTarget); controls.update();
            statusMsgSpan.innerText = '🎥 Visualização resetada.';
            setTimeout(() => { if (statusMsgSpan.innerText === '🎥 Visualização resetada.') statusMsgSpan.innerText = '✅ Pronto'; }, 1500);
        });
        
        updateUI();
        
        // Partículas decorativas
        const particleCount = 600;
        const particleGeo = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            positions[i*3] = (Math.random() - 0.5) * 8;
            positions[i*3+1] = (Math.random() - 0.5) * 4;
            positions[i*3+2] = (Math.random() - 0.5) * 6;
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const particles = new THREE.Points(particleGeo, new THREE.PointsMaterial({ color: 0x88aaff, size: 0.03, transparent: true }));
        scene.add(particles);
        
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            ledComm.material.emissiveIntensity = Math.sin(time * 12) > 0 ? 0.7 : 0.1;
            particles.rotation.y += 0.002;
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
